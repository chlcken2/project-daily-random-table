<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
<!--recipe-detail.html -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title th:text="${recipe.title} + ' - 一人暮らしレシピ'">レシピ詳細</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" th:href="@{/css/recipe.css}" />
</head>
<body
	class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-amber-100 pb-8">
	<header
		class="bg-gradient-to-r from-amber-700 to-amber-800 text-white sticky top-0 z-50 shadow-lg">
		<div class="max-w-4xl mx-auto px-4 py-4">
			<a th:href="@{/gacha/home}"
				class="flex items-center gap-2 hover:text-amber-200 transition-colors">
				<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
					viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="2">
					<path d="m12 19-7-7 7-7" />
					<path d="M19 12H5" /></svg> ガチャに戻る
			</a>
		</div>
	</header>

	<div class="max-w-4xl mx-auto px-4 py-6">

		<!-- Title Image -->
		<div class="bg-white rounded-2xl shadow-lg overflow-hidden mb-6">
			<div class="aspect-video bg-gray-200 overflow-hidden">
				<img th:src="${recipe.titleImage}" th:alt="${recipe.title}"
					onerror="this.src='https://images.unsplash.com/photo-1495521821757-a1efb6729352?w=600'"
					class="w-full h-full object-cover" />
			</div>
		</div>

		<!-- Recipe Info -->
		<section class="bg-white rounded-2xl shadow-lg p-6 mb-6">

			<!-- Title & Description -->
			<h1 class="text-3xl font-bold mb-2" th:text="${recipe.title}">レシピタイトル</h1>
			<p class="text-gray-600 mb-2" th:text="${recipe.description}">概要</p>
			<div class="flex items-center gap-2 text-sm text-gray-500 mb-4">
				<span th:text="'by ' + ${recipe.nickname}">by シェフ</span> <span>•</span>
				<span th:text="${recipe.createdAtFormatted}">1日前</span>
			</div>

			<!-- Stats: 난이도 / 조리시간 / 좋아요 / 조회수 -->
			<div class="grid grid-cols-4 gap-4 mb-6">

				<!-- 난이도 -->
				<div class="bg-amber-50 p-4 rounded-lg text-center">
					<svg xmlns="http://www.w3.org/2000/svg"
						class="w-5 h-5 text-amber-500 mx-auto mb-1" viewBox="0 0 24 24"
						fill="none" stroke="currentColor" stroke-width="2">
            <polygon
							points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
          </svg>
					<p class="text-sm text-gray-600">難易度</p>
					<p class="font-medium text-lg" th:text="${recipe.difficultyLabel}">中</p>
				</div>

				<!-- 조리시간 -->
				<div class="bg-blue-50 p-4 rounded-lg text-center">
					<svg xmlns="http://www.w3.org/2000/svg"
						class="w-5 h-5 text-blue-500 mx-auto mb-1" viewBox="0 0 24 24"
						fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
						<polyline points="12 6 12 12 16 14" />
          </svg>
					<p class="text-sm text-gray-600">調理時間</p>
					<p class="font-medium text-lg"
						th:text="${recipe.cookingTime} + '分'">30分</p>
				</div>

				<!-- 좋아요 -->
				<div class="bg-pink-50 p-4 rounded-lg text-center">
					<svg id="heartEmpty" xmlns="http://www.w3.org/2000/svg"
						class="w-5 h-5 mx-auto mb-1 text-pink-400" viewBox="0 0 24 24"
						fill="none" stroke="currentColor" stroke-width="2"
						th:classappend="${recipe.isLiked} ? 'hidden' : ''">
            <path
							d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z" />
          </svg>
					<svg id="heartFilled" xmlns="http://www.w3.org/2000/svg"
						class="w-5 h-5 mx-auto mb-1 text-red-500" viewBox="0 0 24 24"
						fill="currentColor"
						th:classappend="${recipe.isLiked} ? '' : 'hidden'">
            <path
							d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z" />
          </svg>
					<p class="text-sm text-gray-600">좋아요</p>
					<p class="font-medium text-lg" id="likeCount"
						th:text="${recipe.likeCount}"
						th:classappend="${recipe.isLiked} ? 'text-red-500' : ''">245</p>
				</div>

				<!-- 조회수 -->
				<div class="bg-green-50 p-4 rounded-lg text-center">
					<svg xmlns="http://www.w3.org/2000/svg"
						class="w-5 h-5 text-green-500 mx-auto mb-1" viewBox="0 0 24 24"
						fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
						<circle cx="12" cy="12" r="3" />
          </svg>
					<p class="text-sm text-gray-600">조회수</p>
					<p class="font-medium text-lg" th:text="${recipe.viewCount}">1203</p>
				</div>

			</div>

			<!-- Tags -->
			<div class="flex flex-wrap gap-2 mb-6">
				<span
					class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm"
					th:text="'#' + ${recipe.cuisine}">#韓国料理</span> <span
					class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm"
					th:text="'#' + ${recipe.purpose}">#ガッツリ系</span> <span
					class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm"
					th:text="'#' + ${recipe.difficultyLabel}">#中</span>
			</div>

			<!-- ── 본인 레시피: 좋아요 / 공개·비공개 / 삭제 (3개) ── -->
			<div th:if="${recipe.userId == #authentication.principal}"
				class="grid grid-cols-3 gap-3">

				<!-- 좋아요 버튼 -->
				<button type="button" id="likeBtn" onclick="toggleLike()"
					class="flex items-center justify-center gap-2 py-2.5 rounded-lg border text-sm font-medium transition-all duration-200"
					th:classappend="${recipe.isLiked} ? 'bg-red-500 border-red-500 text-white' : 'bg-white border-gray-200 text-gray-600 hover:bg-red-50'">
					<svg id="btnHeartEmpty" xmlns="http://www.w3.org/2000/svg"
						class="w-4 h-4" viewBox="0 0 24 24" fill="none"
						stroke="currentColor" stroke-width="2"
						th:classappend="${recipe.isLiked} ? 'hidden' : ''">
            <path
							d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z" />
          </svg>
					<svg id="btnHeartFilled" xmlns="http://www.w3.org/2000/svg"
						class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"
						th:classappend="${recipe.isLiked} ? '' : 'hidden'">
            <path
							d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z" />
          </svg>
					좋아요
				</button>

				<!-- 공개/비공개 버튼 -->
				<button type="button" id="publicBtn" onclick="togglePublic()"
					class="flex items-center justify-center gap-2 py-2.5 rounded-lg border text-sm font-medium transition-all duration-200"
					th:classappend="${recipe.isPublic} ? 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50' : 'bg-amber-50 border-amber-300 text-amber-700 hover:bg-amber-100'">
					<svg id="iconPublic" xmlns="http://www.w3.org/2000/svg"
						class="w-4 h-4" viewBox="0 0 24 24" fill="none"
						stroke="currentColor" stroke-width="2"
						th:classappend="${recipe.isPublic} ? '' : 'hidden'">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
						<circle cx="12" cy="12" r="3" />
          </svg>
					<svg id="iconPrivate" xmlns="http://www.w3.org/2000/svg"
						class="w-4 h-4" viewBox="0 0 24 24" fill="none"
						stroke="currentColor" stroke-width="2"
						th:classappend="${recipe.isPublic} ? 'hidden' : ''">
            <path
							d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
            <path
							d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
            <line x1="1" y1="1" x2="23" y2="23" />
          </svg>
					<span id="publicBtnText"
						th:text="${recipe.isPublic} ? '공개 중' : '비공개'">공개 중</span>
				</button>

				<!-- 레시피 삭제 버튼 -->
				<button type="button" onclick="deleteRecipe()"
					class="flex items-center justify-center gap-2 py-2.5 rounded-lg border border-red-200 bg-white text-sm font-medium text-red-500 hover:bg-red-50 transition-colors">
					<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4"
						viewBox="0 0 24 24" fill="none" stroke="currentColor"
						stroke-width="2">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
            <path d="M10 11v6" />
						<path d="M14 11v6" />
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
          </svg>
					레시피 삭제
				</button>

			</div>

			<!-- ── 다른 사람 레시피: 좋아요 버튼만 (전체 너비) ── -->
			<div th:unless="${recipe.userId == #authentication.principal}">
				<button type="button" id="likeBtn" onclick="toggleLike()"
					class="w-full flex items-center justify-center gap-2 py-2.5 rounded-lg border text-sm font-medium transition-all duration-200"
					th:classappend="${recipe.isLiked} ? 'bg-red-500 border-red-500 text-white' : 'bg-white border-gray-200 text-gray-600 hover:bg-red-50'">
					<svg id="btnHeartEmpty" xmlns="http://www.w3.org/2000/svg"
						class="w-4 h-4" viewBox="0 0 24 24" fill="none"
						stroke="currentColor" stroke-width="2"
						th:classappend="${recipe.isLiked} ? 'hidden' : ''">
            <path
							d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z" />
          </svg>
					<svg id="btnHeartFilled" xmlns="http://www.w3.org/2000/svg"
						class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"
						th:classappend="${recipe.isLiked} ? '' : 'hidden'">
            <path
							d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z" />
          </svg>
					좋아요
				</button>
			</div>

		</section>

		<!-- Nutrients -->
		<section class="bg-white rounded-2xl shadow-lg p-6 mb-6"
			th:if="${recipe.nutrients != null and !recipe.nutrients.isEmpty()}">
			<h2 class="text-2xl font-bold mb-4">📊 栄養情報</h2>
			<div class="grid grid-cols-4 gap-4">
				<div th:each="nutrient : ${recipe.nutrients}"
					class="p-4 rounded-lg text-center"
					th:classappend="${nutrient.nutrientName == 'calories' ? 'bg-red-50' : (nutrient.nutrientName == 'protein' ? 'bg-blue-50' : (nutrient.nutrientName == 'fat' ? 'bg-yellow-50' : 'bg-green-50'))}">
					<p class="text-sm text-gray-600"
						th:text="${nutrient.nutrientName == 'calories' ? 'カロリー' : (nutrient.nutrientName == 'protein' ? 'タンパク質' : (nutrient.nutrientName == 'fat' ? '脂質' : '炭水化物'))}">栄養素</p>
					<p class="font-bold text-lg"
						th:text="${nutrient.amount} + ${nutrient.unit}">0g</p>
				</div>
			</div>
		</section>

		<!-- Ingredients -->
		<section class="bg-white rounded-2xl shadow-lg p-6 mb-6"
			th:if="${recipe.ingredients != null and !recipe.ingredients.isEmpty()}">
			<h2 class="text-2xl font-bold mb-4">🍃 재료</h2>
			<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
				<div th:each="ingredient : ${recipe.ingredients}"
					class="flex items-center justify-between bg-amber-50 p-3 rounded-lg shadow-sm">
					<div class="flex items-center gap-3">
						<span
							class="inline-block w-10 h-10 bg-white rounded-md flex items-center justify-center text-xl">🌿</span>
						<div class="font-medium" th:text="${ingredient.name}">밥</div>
					</div>
					<div class="text-gray-700 font-medium"
						th:text="${ingredient.quantity} + ' ' + ${ingredient.unit}">1공기</div>
				</div>
			</div>
		</section>

		<!-- Steps -->
		<section class="bg-white rounded-2xl shadow-lg p-6 mb-6"
			th:if="${recipe.steps != null and !recipe.steps.isEmpty()}">
			<h2 class="text-2xl font-bold mb-4">👨‍🍳 調理方法</h2>
			<div class="space-y-3">
				<div th:each="step : ${recipe.steps}" class="flex gap-4 items-start">
					<div class="flex-shrink-0">
						<div
							class="w-10 h-10 bg-gradient-to-br from-amber-500 to-orange-600 text-white rounded-full flex items-center justify-center font-medium">
							<span th:text="${step.stepOrder}">1</span>
						</div>
					</div>
					<div class="flex-1 bg-gray-50 p-4 rounded-lg">
						<p th:text="${step.content}">調理ステップ</p>
					</div>
				</div>
			</div>
		</section>

		<!-- Comments -->
		<section class="bg-white rounded-2xl shadow-lg p-6 mb-6">
			<h2 class="text-2xl font-bold mb-4">
				💬 コメント <span class="text-sm text-gray-500" id="commentCount"
					th:text="'(' + ${recipe.commentCount} + ')'"></span>
			</h2>
			<div class="flex gap-2 mb-4">
				<input type="text" id="commentInput" placeholder="コメントを入力してください..."
					class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring" />
				<button onclick="submitComment()"
					class="flex items-center gap-1.5 bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-full text-sm font-medium transition-colors">
					<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4"
						viewBox="0 0 24 24" fill="none" stroke="currentColor"
						stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13" />
						<polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
					작성
				</button>
			</div>
			<div class="space-y-4" id="commentList"></div>
		</section>

		<!-- Back to Gacha -->
		<div class="text-center">
			<a th:href="@{/gacha/home}"
				class="inline-block bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white px-8 py-3 rounded-xl font-medium shadow-lg transition-colors">
				🎲 もう一度ガチャを回す </a>
		</div>
	</div>

	<script th:inline="javascript">
    const recipeId = /*[[${recipe.id}]]*/ 0;
    const currentUserId = /*[[${loginUserId}]]*/ null;
    let liked = /*[[${recipe.isLiked}]]*/ false;
    let likeCount = /*[[${recipe.likeCount}]]*/ 0;
    let isPublic = /*[[${recipe.isPublic}]]*/ false;

    /* ── 댓글 수 서버에서 갱신 ── */
    function fetchCommentCount() {
      fetch(`/recipes/${recipeId}/comments/count`)
        .then(res => res.json())
        .then(count => {
          document.getElementById('commentCount').textContent = `(${count})`;
        });
    }

    /* ── 좋아요 토글 ── */
    function toggleLike() {
      const url = `/recipes/${recipeId}/likes`;
      const method = liked ? 'DELETE' : 'POST';

      fetch(url, { method })
        .then(res => {
          if (!res.ok) throw new Error('failed');

          liked = !liked;
          likeCount += liked ? 1 : -1;

          document.getElementById('heartEmpty').classList.toggle('hidden', liked);
          document.getElementById('heartFilled').classList.toggle('hidden', !liked);
          const countEl = document.getElementById('likeCount');
          countEl.textContent = likeCount;
          countEl.classList.toggle('text-red-500', liked);

          const btn = document.getElementById('likeBtn');
          document.getElementById('btnHeartEmpty').classList.toggle('hidden', liked);
          document.getElementById('btnHeartFilled').classList.toggle('hidden', !liked);
          if (liked) {
            btn.className = btn.className.replace(/bg-white.*?hover:bg-red-50/, 'bg-red-500 border-red-500 text-white');
          } else {
            btn.className = btn.className.replace(/bg-red-500 border-red-500 text-white/, 'bg-white border-gray-200 text-gray-600 hover:bg-red-50');
          }
        })
        .catch(() => alert('로그인이 필요합니다.'));
    }

    /* ── 공개/비공개 토글 ── */
function togglePublic() {
  fetch(`/recipes/${recipeId}/visibility?isPublic=${!isPublic}`, {
    method: 'PATCH'
  })
  .then(res => {
    if (!res.ok) throw new Error('failed');

    isPublic = !isPublic;

    document.getElementById('iconPublic').classList.toggle('hidden', !isPublic);
    document.getElementById('iconPrivate').classList.toggle('hidden', isPublic);
    document.getElementById('publicBtnText').textContent = isPublic ? '공개 중' : '비공개';

    const btn = document.getElementById('publicBtn');
    if (isPublic) {
      btn.className = 'flex items-center justify-center gap-2 py-2.5 rounded-lg border text-sm font-medium transition-all duration-200 bg-white border-gray-200 text-gray-600 hover:bg-gray-50';
    } else {
      btn.className = 'flex items-center justify-center gap-2 py-2.5 rounded-lg border text-sm font-medium transition-all duration-200 bg-amber-50 border-amber-300 text-amber-700 hover:bg-amber-100';
    }
  })
  .catch(() => alert('로그인이 필요합니다.'));
}

    /* ── 레시피 삭제 ── */
    function deleteRecipe() {
      if (!confirm('레시피를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;

      fetch(`/recipes/${recipeId}`, { method: 'DELETE' })
        .then(res => {
          if (!res.ok) throw new Error('failed');
          window.location.href = '/mypage';
        })
        .catch(() => alert('삭제에 실패했습니다.'));
    }

    /* ── 댓글 로드 ── */
    function loadComments(page = 1) {
      fetch(`/recipes/${recipeId}/comments?page=${page}`)
        .then(res => res.json())
        .then(comments => {
          const list = document.getElementById('commentList');
          list.innerHTML = '';
          comments.forEach(c => {
            const isOwner = currentUserId !== null && currentUserId === c.userId;
            const div = document.createElement('div');
            div.className = 'bg-gray-50 p-4 rounded-lg';
            div.id = `comment-${c.commentId}`;
            div.innerHTML = `
              <div class="flex items-start justify-between">
                <div class="flex-1">
                  <div class="flex items-center gap-2 mb-1">
                    <span class="font-semibold text-sm text-amber-700">${c.nickname}</span>
                    <span class="text-xs text-gray-400">${c.createdAtFormatted ?? ''}</span>
                  </div>
                  <div id="content-${c.commentId}" class="text-sm text-gray-700">${c.content}</div>
                  <div id="edit-area-${c.commentId}" class="hidden mt-2 flex gap-2">
                    <input type="text" id="edit-input-${c.commentId}" value="${c.content}"
                           class="flex-1 border rounded-full px-3 py-1 text-sm focus:outline-none focus:ring"/>
                    <button onclick="submitEdit(${c.commentId})"
                            class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1 rounded-full text-xs font-medium transition-colors">
                      저장
                    </button>
                    <button onclick="cancelEdit(${c.commentId})"
                            class="bg-gray-200 hover:bg-gray-300 text-gray-600 px-3 py-1 rounded-full text-xs font-medium transition-colors">
                      취소
                    </button>
                  </div>
                </div>
                ${isOwner ? `
                <div class="flex gap-1 ml-2 flex-shrink-0">
                  <button onclick="startEdit(${c.commentId})"
                          class="text-xs text-amber-600 hover:text-amber-700 px-2 py-1 rounded hover:bg-amber-50 transition-colors">
                    수정
                  </button>
                  <button onclick="deleteComment(${c.commentId})"
                          class="text-xs text-red-400 hover:text-red-500 px-2 py-1 rounded hover:bg-red-50 transition-colors">
                    삭제
                  </button>
                </div>` : ''}
              </div>`;
            list.appendChild(div);
          });
        });
    }

    /* ── 댓글 작성 ── */
    function submitComment() {
      const input = document.getElementById('commentInput');
      const content = input.value.trim();
      if (!content) return;

      fetch(`/recipes/${recipeId}/comments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      }).then(res => {
        if (!res.ok) throw new Error('failed');
        input.value = '';
        fetchCommentCount();
        loadComments();
      }).catch(() => alert('로그인이 필요합니다.'));
    }

    /* ── 댓글 수정 시작 ── */
    function startEdit(commentId) {
      document.getElementById(`content-${commentId}`).classList.add('hidden');
      document.getElementById(`edit-area-${commentId}`).classList.remove('hidden');
    }

    /* ── 댓글 수정 취소 ── */
    function cancelEdit(commentId) {
      document.getElementById(`content-${commentId}`).classList.remove('hidden');
      document.getElementById(`edit-area-${commentId}`).classList.add('hidden');
    }

    /* ── 댓글 수정 저장 ── */
    function submitEdit(commentId) {
      const content = document.getElementById(`edit-input-${commentId}`).value.trim();
      if (!content) return;

      fetch(`/recipes/${recipeId}/comments/${commentId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      }).then(res => {
        if (!res.ok) throw new Error('failed');
        loadComments();
      });
    }

    /* ── 댓글 삭제 ── */
    function deleteComment(commentId) {
      if (!confirm('댓글을 삭제하시겠습니까?')) return;

      fetch(`/recipes/${recipeId}/comments/${commentId}`, {
        method: 'DELETE'
      }).then(res => {
        if (!res.ok) throw new Error('failed');
        fetchCommentCount();
        loadComments();
      });
    }

    document.getElementById('commentInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitComment();
    });

    loadComments();
  </script>
</body>
</html>
