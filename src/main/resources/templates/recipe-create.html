<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>食事ガチャ - 一人暮らしレシピ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" th:href="@{/css/recipe.css}"/>
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-amber-100 pb-8">
  <header class="bg-gradient-to-r from-amber-700 to-amber-800 text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-4xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a th:href="@{/}" href="/" class="flex items-center gap-2 hover:text-amber-200 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          戻る
        </a>
        <h1 class="text-xl font-bold">🎰 食事ガチャ</h1>
        <div class="w-20"></div>
      </div>
    </div>
  </header>

  <div class="max-w-4xl mx-auto px-4 py-6">
    <!-- Gacha Banner -->
    <div class="mb-6 bg-gradient-to-r from-purple-600 via-pink-600 to-orange-500 rounded-2xl p-6 text-white shadow-2xl relative overflow-hidden">
      <div class="relative z-10">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-3">
          <div class="flex items-center gap-3">
            <span class="text-3xl">🎁</span>
            <div>
              <h2 class="text-2xl font-bold">🎲 食事ガチャシステム</h2>
              <p class="text-sm text-pink-100">食材を入れてランダムレシピを引いてみよう！</p>
            </div>
          </div>
          <div class="text-left sm:text-right">
            <div class="text-3xl font-bold"><span id="gacha-count">0</span>/3</div>
            <div class="text-xs text-pink-100">今日使ったガチャ回数</div>
          </div>
        </div>
        <div id="gacha-limit-msg" class="hidden bg-red-500/30 border border-red-300 rounded-lg p-3 flex items-center gap-2 mt-3">
          <span>⚠</span>
          <span>本日のガチャチャンスをすべて使いました！また明日チャレンジしてね</span>
        </div>
      </div>
    </div>

    <!-- Ingredient & Sauce Input -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- Ingredients -->
      <section class="bg-white rounded-2xl shadow-lg p-6">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
          🧊 冷蔵庫の食材
          <span class="text-sm text-gray-500 ml-auto font-normal" id="ingredient-count">0個</span>
        </h2>
        <div class="mb-4">
          <div class="grid grid-cols-3 gap-2 mb-2">
            <input type="text" id="ingredient-name" placeholder="食材名"
                   class="px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"/>
            <input type="text" id="ingredient-amount" placeholder="分量"
                   class="px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"/>
            <select id="ingredient-unit" class="px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
              <option value="g">g</option>
              <option value="ml">ml</option>
              <option value="個">個</option>
              <option value="カップ">カップ</option>
              <option value="スプーン">スプーン</option>
            </select>
          </div>
          <button type="button" id="add-ingredient" class="w-full bg-amber-600 hover:bg-amber-700 text-white py-2 rounded-lg flex items-center justify-center gap-2 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            冷蔵庫に入れる
          </button>
        </div>
        <div id="ingredient-list" class="space-y-2 max-h-64 overflow-y-auto">
          <p class="text-center text-gray-400 py-8">冷蔵庫が空っぽです 🥲</p>
        </div>
      </section>

      <!-- Sauces -->
      <section class="bg-white rounded-2xl shadow-lg p-6">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
          🧴 調味料 (ソース)
          <span class="text-sm text-gray-500 ml-auto font-normal" id="sauce-count">0個</span>
        </h2>
        <div class="mb-4">
          <div class="grid grid-cols-3 gap-2 mb-2">
            <input type="text" id="sauce-name" placeholder="ソース名"
                   class="px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"/>
            <input type="text" id="sauce-amount" placeholder="分量"
                   class="px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"/>
            <select id="sauce-unit" class="px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
              <option value="ml">ml</option>
              <option value="g">g</option>
              <option value="スプーン">スプーン</option>
              <option value="ティースプーン">ティースプーン</option>
            </select>
          </div>
          <button type="button" id="add-sauce" class="w-full bg-orange-600 hover:bg-orange-700 text-white py-2 rounded-lg flex items-center justify-center gap-2 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            調味料入れに追加
          </button>
        </div>
        <div id="sauce-list" class="space-y-2 max-h-64 overflow-y-auto">
          <p class="text-center text-gray-400 py-8">調味料が空です (任意)</p>
        </div>
      </section>
    </div>

    <!-- Options -->
    <section class="bg-white rounded-2xl shadow-lg p-6 mt-6">
      <h2 class="text-xl font-bold mb-6">🎯 料理設定</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium mb-3 text-gray-700">どんな料理？</label>
          <div class="space-y-2">
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-purple-50 transition-colors">
              <input type="radio" name="purpose" value="속세의맛" checked class="accent-purple-600"/>
              <span>🔥 ガッツリ系</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-purple-50 transition-colors">
              <input type="radio" name="purpose" value="다이어트" class="accent-purple-600"/>
              <span>🥗 ダイエット</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-purple-50 transition-colors">
              <input type="radio" name="purpose" value="건강식" class="accent-purple-600"/>
              <span>💪 ヘルシー</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-purple-50 transition-colors">
              <input type="radio" name="purpose" value="술안주" class="accent-purple-600"/>
              <span>🍺 おつまみ</span>
            </label>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-3 text-gray-700">どの国の料理？</label>
          <div class="space-y-2">
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-blue-50 transition-colors">
              <input type="radio" name="cuisine" value="상관없음" checked class="accent-blue-600"/>
              <span>🌍 なんでも <span class="text-xs text-gray-400">(何でもOK！)</span></span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-blue-50 transition-colors">
              <input type="radio" name="cuisine" value="한식" class="accent-blue-600"/>
              <span>🇰🇷 韓国料理</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-blue-50 transition-colors">
              <input type="radio" name="cuisine" value="일식" class="accent-blue-600"/>
              <span>🇯🇵 日本料理</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-blue-50 transition-colors">
              <input type="radio" name="cuisine" value="중식" class="accent-blue-600"/>
              <span>🇨🇳 中華料理</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-blue-50 transition-colors">
              <input type="radio" name="cuisine" value="양식" class="accent-blue-600"/>
              <span>🇮🇹 洋食</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-blue-50 transition-colors">
              <input type="radio" name="cuisine" value="동남아" class="accent-blue-600"/>
              <span>🇹🇭 東南アジア料理</span>
            </label>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-3 text-gray-700">私の料理レベルは？</label>
          <div class="space-y-2">
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-green-50 transition-colors">
              <input type="radio" name="difficulty" value="상관없음" checked class="accent-green-600"/>
              <span>🎲 なんでも <span class="text-xs text-gray-400">(運に任せる！)</span></span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-green-50 transition-colors">
              <input type="radio" name="difficulty" value="하" class="accent-green-600"/>
              <span>⭐ 低</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-green-50 transition-colors">
              <input type="radio" name="difficulty" value="중" class="accent-green-600"/>
              <span>⭐⭐ 中</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-green-50 transition-colors">
              <input type="radio" name="difficulty" value="상" class="accent-green-600"/>
              <span>⭐⭐⭐ 高</span>
            </label>
          </div>
        </div>
      </div>
    </section>

    <!-- Generate Button -->
    <button type="button" id="gacha-btn" disabled
            class="mt-6 w-full bg-gradient-to-r from-purple-600 via-pink-600 to-orange-500 hover:from-purple-700 hover:via-pink-700 hover:to-orange-600 text-white py-6 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-2xl text-xl font-bold disabled:opacity-60 disabled:cursor-not-allowed">
      <span id="gacha-btn-text">🎲 食事ガチャを回す！</span>
    </button>
    <p id="gacha-warning" class="hidden text-center text-red-500 mt-3 text-sm font-medium">食材を1つ以上追加してください！</p>

    <!-- Error Toast -->
    <div id="error-toast" class="hidden fixed top-20 left-1/2 transform -translate-x-1/2 z-50 bg-red-500 text-white px-6 py-4 rounded-xl shadow-2xl max-w-md text-center animate-fade-in-up">
      <p id="error-toast-msg">エラーが発生しました</p>
      <button type="button" onclick="document.getElementById('error-toast').classList.add('hidden')" class="mt-2 text-sm underline">閉じる</button>
    </div>

    <!-- Rolling Animation -->
    <div id="gacha-rolling" class="hidden mt-6 bg-gradient-to-br from-purple-600 to-pink-600 rounded-2xl p-12 shadow-2xl">
      <div class="flex flex-col items-center justify-center text-white">
        <div class="text-6xl mb-4 animate-dice-wiggle">🍳</div>
        <h3 class="text-3xl font-bold mb-2">シェフが料理中...</h3>
        <p class="text-lg text-pink-100 mb-4">どんなレシピが出るかな？わくわく</p>
        <div class="w-full bg-white/20 rounded-full h-3 max-w-xs">
          <div id="progress-bar" class="bg-white rounded-full h-3 transition-all duration-500" style="width: 0%"></div>
        </div>
        <p id="progress-text" class="text-sm text-pink-200 mt-2">AIが食材を分析しています...</p>
      </div>
    </div>

    <!-- Result Card -->
    <section id="gacha-result" class="hidden bg-white rounded-2xl shadow-2xl p-6 mt-6 border-4 border-yellow-400 relative overflow-hidden animate-fade-in-up">
      <div class="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-yellow-400 via-pink-500 to-purple-600"></div>
      <div class="flex items-center gap-2 mb-4 pt-2">
        <span class="text-2xl">✨</span>
        <h2 class="text-2xl font-bold">ガチャ結果！</h2>
      </div>
      <div class="bg-gradient-to-br from-purple-50 via-pink-50 to-orange-50 rounded-xl p-6 relative">
        <div class="aspect-video bg-gray-200 rounded-lg mb-4 overflow-hidden">
          <img id="result-image" src="" alt="レシピ画像" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1495521821757-a1efb6729352?w=600'"/>
        </div>
        <h3 id="result-title" class="text-2xl font-bold mb-2"></h3>
        <p id="result-summary" class="text-gray-600 mb-4"></p>
        <div class="flex items-center gap-3 mb-4">
          <span id="result-difficulty" class="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-sm font-medium"></span>
          <span id="result-time" class="text-sm text-gray-600 font-medium flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span id="result-time-text"></span>
          </span>
        </div>

        <!-- Nutrients -->
        <div id="result-nutrients" class="grid grid-cols-4 gap-2 mb-4">
        </div>

        <!-- Ingredients preview -->
        <div id="result-ingredients" class="mb-4">
          <h4 class="font-bold text-sm text-gray-700 mb-2">📦 食材</h4>
          <div id="result-ingredients-list" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Action Buttons -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-4">
          <a id="btn-detail" href="#" class="bg-white hover:bg-gray-50 border-2 border-amber-400 text-amber-700 py-3 rounded-lg font-medium shadow-md transition-colors flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            詳細を見る
          </a>
          <button type="button" id="btn-private" class="bg-white hover:bg-gray-50 border-2 border-purple-400 text-purple-700 py-3 rounded-lg font-medium shadow-md transition-colors flex items-center justify-center gap-2">
            🔒 私だけの食卓
          </button>
          <button type="button" id="btn-public" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white py-3 rounded-lg font-medium shadow-md text-center transition-colors flex items-center justify-center gap-2">
            🌍 みんなの食卓
          </button>
        </div>
      </div>
    </section>
  </div>
  <script th:src="@{/js/recipe-create.js}"></script>
</body>
</html>
